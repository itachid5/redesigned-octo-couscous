<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Keeper Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #fafafa; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #333; }
        .log-btn { background-color: #e0e0e0; color: #000; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 14px; }
        .log-btn:hover { background-color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Add New SSH Connection</h2>
            <form action="/add" method="POST">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>Name</label><input type="text" name="name" required placeholder="e.g. My Ubuntu VPS"></div>
                    <div style="flex: 1;"><label>Host (IP)</label><input type="text" name="host" required placeholder="192.168.1.1"></div>
                    <div style="flex: 1;"><label>Port</label><input type="number" name="port" value="22" required></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>Username</label><input type="text" name="user" required placeholder="root"></div>
                    <div style="flex: 1;"><label>Key Filename</label><input type="text" name="key_file" required placeholder="id_rsa"></div>
                </div>
                <button type="submit">Add Server & Connect</button>
            </form>
        </div>

        <div class="card">
            <h2>Active Connections</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>User @ Host</th>
                        <th>Key File</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for server in servers %}
                    <tr>
                        <td>{{ server.name }}</td>
                        <td>{{ server.user }}@{{ server.host }}:{{ server.port }}</td>
                        <td>{{ server.key_file }}</td>
                        <td><a href="/logs/{{ server.id }}" target="_blank" class="log-btn">View Logs</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
